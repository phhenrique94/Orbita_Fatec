<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório DP - Órbita FATEC</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/core/layout.css">
    <link rel="stylesheet" href="/secretaria/relatorio-dp/relatorio-dp.css">
</head>
<body class="pagina-relatorio">
    <div id="auth-guard" class="layout-auth-guard">
        <div class="layout-spinner"></div>
        <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
    </div>

    <div id="app" class="layout-wrapper hidden">
        <main class="layout-main">
            <div class="layout-content dp-content no-print">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Relatório DP</h1>
                        <p class="page-subtitle">Escolha os filtros e imprima ou salve em PDF</p>
                    </div>
                    <div class="page-header-actions">
                        <a class="btn-import" href="index.html" style="text-decoration:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                            Voltar
                        </a>
                        <button class="btn-primary" id="btn-imprimir-relatorio">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            Imprimir / Salvar PDF
                        </button>
                    </div>
                </div>

                <div class="panel rel-opcoes hidden" id="dp-relatorio-opcoes">
                    <span class="eyebrow">Filtros do relatório</span>
                    <h2 class="title">Escolha o que vai sair no relatório</h2>
                    <p class="hint">Selecione o curso e, se quiser, um aluno específico — a impressão segue só com o que estiver marcado aqui.</p>

                    <div class="rev-grid2">
                        <div class="form-group">
                            <label>Curso</label>
                            <select id="dp-rel-curso">
                                <option value="" disabled selected>Selecione um curso...</option>
                                <option value="__ALL__">Todos os cursos</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Aluno</label>
                            <select id="dp-rel-aluno" disabled>
                                <option value="">Selecione um curso para filtrar por aluno</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Situação a incluir</label>
                        <select id="dp-rel-situacao">
                            <option value="">Todas as disciplinas</option>
                            <option value="pendentes">Somente pendentes (A cursar / Cursando)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Colunas a imprimir</label>
                        <div class="rel-opcoes-lista">
                            <label><input type="checkbox" value="turma" checked> Turma</label>
                            <label><input type="checkbox" value="disciplina" checked> Disciplina</label>
                            <label><input type="checkbox" value="status" checked> Status</label>
                            <label><input type="checkbox" value="periodo" checked> Período contemplado</label>
                            <label><input type="checkbox" value="professor"> Professor</label>
                            <label><input type="checkbox" value="financeiro"> Financeiro</label>
                        </div>
                    </div>
                </div>

                <div id="dp-relatorio-msg" class="panel"><p class="hint" style="margin:0">Carregando relatório...</p></div>
            </div>

            <!-- Conteúdo do relatório: só isto fica visível na impressão -->
            <div class="print-page" id="dp-relatorio-conteudo"></div>
        </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/secretaria/relatorio-dp/app.js"></script>
</body>
</html>
