<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empréstimo · Órbita - FatecIVP</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="/core/layout.css">
  <link rel="stylesheet" href="/emprestimo/emprestimo.css?v=3">
</head>

<body>

  <!-- Novo Auth Guard Padrão -->
  <div id="auth-guard" class="layout-auth-guard">
    <div class="layout-spinner"></div>
    <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
  </div>

  <div id="app" class="layout-wrapper hidden">
    <!-- Sidebar injetada pelo layout.js -->

    <div class="layout-main">
      <!-- Header injetado pelo layout.js -->

      <div class="layout-content">

        <main id="dashboard-view" class="mod-main hidden">
          <!-- Filtro de Categorias em Abas (Pills) -->
          <div class="category-tabs" id="category-tabs-container"></div>

          <!-- Status Summary -->
          <div class="status-summary">
            <div class="stat-item" data-filter="Todos" style="border-left-color: var(--purple-bright)">
              <span class="stat-val" id="stat-total">0</span>
              <span class="stat-lbl">Total</span>
            </div>
            <div class="stat-item" data-filter="guardado" style="border-left-color: var(--c-guardado)">
              <span class="stat-val" id="stat-guardado">0</span>
              <span class="stat-lbl">Disponíveis</span>
            </div>
            <div class="stat-item" data-filter="emprestado" style="border-left-color: var(--c-emprestado)">
              <span class="stat-val" id="stat-emprestado">0</span>
              <span class="stat-lbl">Emprestados</span>
            </div>
            <div class="stat-item" data-filter="cedido" style="border-left-color: var(--c-cedido)">
              <span class="stat-val" id="stat-cedido">0</span>
              <span class="stat-lbl">Cedidos</span>
            </div>
            <div class="stat-item" data-filter="reservado" style="border-left-color: var(--c-reservado)">
              <span class="stat-val" id="stat-reservado">0</span>
              <span class="stat-lbl">Reservados</span>
            </div>
          </div>

          <!-- Toolbar e Filtros -->
          <div class="toolbar-container">
            <div class="toolbar-top" style="display: flex; gap: 1rem; align-items: center; width: 100%;">
              <div class="search-box" style="flex: 1;">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2">
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar item (ex: Not_Med01, Proj01)">
              </div>
              <button onclick="abrirScanner()" class="btn-scan-qr action-execute" style="flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.2rem; background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue)); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(15, 78, 184, 0.25);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>Escanear QR</span>
              </button>
              <button onclick="abrirCadastro()" class="btn-primary action-execute" style="flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.2rem; background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue)); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(15, 78, 184, 0.25);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>Cadastrar Item</span>
              </button>
            </div>

            <div class="filters-row">
              <div class="filter-group">
                <label>Status</label>
                <select id="filter-status">
                  <option>Todos</option>
                  <option value="guardado">Disponível</option>
                  <option value="emprestado">Emprestado</option>
                  <option value="cedido">Cedido</option>
                  <option value="reservado">Reservado</option>
                </select>
              </div>
              <div class="filter-group">
                <label>Categoria</label>
                <select id="filter-categoria">
                  <option>Todos</option>
                  <!-- Populated dynamically -->
                </select>
              </div>
              <div class="filter-group">
                <label>Local/Sala</label>
                <select id="filter-sala">
                  <option>Todos</option>
                </select>
              </div>
              <div class="filter-group">
                <label>Origem</label>
                <select id="filter-local">
                  <option>Todos</option>
                  <option>T.I.</option>
                  <option>Carrinho</option>
                </select>
              </div>
              <div class="grid-info" id="grid-count">0 itens</div>
            </div>
          </div>

          <div id="notebook-grid" class="notebook-grid">
            <!-- Cards -->
          </div>
        </main>

        <!-- Modais -->
        <div id="modal-cadastro" class="modal-overlay">
          <div class="modal-box">
            <h3 style="margin-bottom:0.5rem; font-weight: 800;">Cadastrar Novo Item</h3>
            <p style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:0.9rem; font-weight: 500;">Registre um novo equipamento na base de empréstimos.</p>
            <form id="form-cadastro">
              <div class="form-group" style="text-align:left;">
                <label class="form-label">Identificador (Código) <span style="color:red">*</span></label>
                <input type="text" id="cad-id" class="form-control" placeholder="Ex: Proj_01, Not_Med08, Mouse_03" required>
              </div>
              <div class="form-group" style="text-align:left;">
                <label class="form-label">Tipo do Item <span style="color:red">*</span></label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                  <select id="cad-tipo" class="form-control" required style="flex: 1;">
                    <!-- Categories will be rendered here dynamically -->
                  </select>
                  <button type="button" id="btn-add-tipo" class="btn btn-secondary" style="padding: 0.8rem; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 48px; height: 48px;" title="Criar Nova Categoria">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                </div>
              </div>
              <div id="new-category-group" class="form-group hidden" style="text-align:left; margin-top: 0.75rem; border: 1.5px dashed var(--border-color); padding: 1rem; border-radius: 12px; background: rgba(3, 20, 38, 0.02);">
                <label class="form-label" style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 700;">Nome da Nova Categoria <span style="color:red">*</span></label>
                <div style="display: flex; gap: 0.5rem;">
                  <input type="text" id="cad-tipo-novo" class="form-control" placeholder="Ex: Passador, Câmera" style="flex: 1;">
                  <button type="button" id="btn-save-tipo" class="btn btn-primary" style="padding: 0 1rem; border-radius: 10px; font-size: 0.82rem; font-weight: 700; background: var(--primary-blue); color: white;">Criar</button>
                  <button type="button" id="btn-cancel-tipo" class="btn btn-secondary" style="padding: 0 0.8rem; border-radius: 10px; font-size: 0.82rem; width: auto;">X</button>
                </div>
              </div>
              <div style="margin:1.5rem 0; display:flex; align-items:center; gap:0.6rem; text-align:left;">
                <input type="checkbox" id="cad-tem-qr" checked style="width:18px; height:18px; cursor:pointer;">
                <label for="cad-tem-qr" style="cursor:pointer; font-weight:700; color:var(--text-main); font-size:0.85rem; user-select:none;">Gerar/Possui etiqueta de QR Code</label>
              </div>
              <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                <button type="button" class="btn btn-secondary" onclick="fecharCadastro()" style="flex:1">Cancelar</button>
                <button type="submit" class="btn btn-primary" style="flex:1; background:linear-gradient(135deg, var(--primary-blue), var(--primary-blue)); color:white; box-shadow: 0 4px 15px rgba(15, 78, 184, 0.25);">Confirmar</button>
              </div>
            </form>
          </div>
        </div>

        <div id="modal-reserva" class="modal-overlay">
          <div class="modal-box">
            <h3>Reservar</h3>
            <p id="reserva-subtitle" style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.9rem;"></p>
            <form id="form-reserva">
              <input type="hidden" id="reserva-notebook-id">
              <div style="margin:1rem 0">
                <label class="stat-lbl">Data</label>
                <input type="date" id="reserva-dia" required
                  style="width:100%; padding:0.8rem; background:#05040a; border:1px solid var(--border); color:white; border-radius:8px">
              </div>
              <div style="margin:1rem 0">
                <label class="stat-lbl">Motivo</label>
                <input type="text" id="reserva-motivo" placeholder="Professor / Sala" required
                  style="width:100%; padding:0.8rem; background:#05040a; border:1px solid var(--border); color:white; border-radius:8px">
              </div>
              <div style="display:flex; gap:1rem">
                <button type="button" class="btn btn-secondary" onclick="fecharModalReserva()"
                  style="flex:1">Cancelar</button>
                <button type="submit" class="btn btn-primary" style="flex:1">Confirmar</button>
              </div>
            </form>
          </div>
        </div>

        <div id="qr-modal" class="modal-overlay">
          <div class="modal-box" style="text-align:center">
            <div class="printable-qr"
              style="background:white; padding:1.5rem; border-radius:12px; margin:0 auto 1.5rem; display:inline-block; border:1px solid #eee;">
              <div id="qr-code-canvas"></div>
              <div id="qr-label-name"
                style="color:black; font-weight:900; font-size:1.2rem; margin-top:0.5rem; font-family:'Outfit',sans-serif;">
              </div>
            </div>
            <div class="modal-actions" style="display:flex; flex-direction:column; gap:0.5rem">
              <div style="display:flex; gap:0.5rem">
                <button id="btn-imprimir-qr" class="btn btn-secondary" style="flex:1">Imprimir</button>
                <button id="btn-baixar-qr" class="btn btn-primary" style="flex:1">Baixar</button>
              </div>
              <button class="btn btn-secondary" onclick="fecharQR()"
                style="width:100%; border:none; background:none; opacity:0.6;">Fechar</button>
            </div>
          </div>
        </div>

        <div id="modal-historico" class="modal-overlay">
          <div class="modal-box" style="max-width: 500px;">
            <h3 style="margin-bottom:0.5rem; font-weight: 800;">Histórico de Movimentações</h3>
            <p id="historico-subtitle" style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:0.9rem; font-weight: 500;"></p>
            <div id="historico-list" style="display:flex; flex-direction:column; gap:1rem;">
              <!-- Historico cards injected here -->
            </div>
            <div style="display:flex; margin-top:1.5rem;">
              <button class="btn btn-secondary" onclick="fecharModalHistorico()" style="width:100%">Fechar</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="scanner-modal" class="modal-overlay">
      <div class="modal-box">
        <h3>Escanear QR</h3>
        <div id="reader" style="width:100%"></div>
        <button class="btn btn-secondary" onclick="fecharScanner()" style="width:100%; margin-top:1rem">Fechar</button>
      </div>
    </div>

  </div> <!-- Fim layout-content -->
  </div> <!-- Fim layout-main -->
  </div> <!-- Fim layout-wrapper -->

  <script type="module" src="/emprestimo/app.js?v=3"></script>
</body>

</html>
