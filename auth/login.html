<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Órbita Fatec</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/auth/login.css">
</head>
<body>

  <div class="particles"></div>

  <div class="login-card">
    <div class="orbit-wrapper">
      <div class="orbit-container">
        <div class="orbit-center">F</div>
        <div class="orbit-planet"></div>
      </div>
      <h1 class="login-logo">
        <span class="logo-orbita">ÓRBITA</span><span class="logo-fatec">FATEC</span>
      </h1>
    </div>

    <p class="login-subtitle">Bem-vindo de volta! Por favor, insira suas credenciais institucionais.</p>

    <form id="login-form">
      <div class="form-group">
        <label for="login-email">E-mail Institucional</label>
        <input type="email" id="login-email" class="form-input" placeholder="seu.nome@fatec.sp.gov.br" required>
      </div>
      
      <div class="form-group">
        <label for="login-password">Senha de Acesso</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span id="login-btn-text">Acessar Sistema</span>
      </button>

      <p id="login-error">As credenciais informadas não são válidas.</p>
    </form>
  </div>

  <script type="module" src="/auth/login.js"></script>
</body>
</html>
