<!DOCTYPE html>
<!-- Deploy Timestamp: 2026-05-06T20:04:00Z -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Espaço · Órbita Fatec</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/core/layout.css">
  <link rel="stylesheet" href="/meu-espaco/meu-espaco.css">
</head>
<body>
  <div class="particles"></div>

  <!-- Auth Guard Padrão -->
  <div id="auth-guard" class="layout-auth-guard">
    <div class="layout-spinner"></div>
    <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
  </div>

  <div id="app" class="layout-wrapper hidden">
    <!-- Sidebar e Header injetados via layout.js -->
    <div class="layout-main">
      <div class="layout-content">
        
        <main class="mod-main" id="main-content">
          <div class="welcome-section">
            <h1 class="page-title">Meu Espaço</h1>
            <p class="page-subtitle">Organize seus lembretes, acompanhe avisos e veja informações úteis para sua rotina.</p>
          </div>

          <!-- Linha superior: Widgets por Permissão -->
          <div id="widgets-grid" class="widgets-grid">
            <!-- Renderizado dinamicamente via JS -->
          </div>

          <!-- Conteúdo Principal -->
          <div class="espaco-layout">
            <!-- Coluna Esquerda: Quadro do Funcionário -->
            <section class="notes-section">
              <div class="section-header">
                <div class="header-title">
                  <span class="icon">📌</span>
                  <h2>Quadro do Funcionário</h2>
                </div>
                <button id="btn-new-note" class="btn btn-primary btn-sm">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Nova Nota
                </button>
              </div>

              <div id="notes-grid" class="notes-grid">
                <!-- Notas carregadas via JS -->
                <div class="loading-state">Carregando suas notas...</div>
              </div>
            </section>

            <!-- Coluna Direita: Quadro de Avisos Institucionais -->
            <aside class="notices-section">
              <div class="section-header">
                <div class="header-title">
                  <span class="icon">📢</span>
                  <h2>Avisos Institucionais</h2>
                </div>
                <!-- Visível apenas para ADM N1 -->
                <button id="btn-new-notice" class="btn btn-secondary btn-sm action-adm-n1 hidden">
                  Gerenciar
                </button>
              </div>

              <div id="notices-list" class="notices-list">
                <!-- Avisos carregados via JS -->
                <div class="loading-state">Carregando avisos...</div>
              </div>
            </aside>
          </div>
        </main>

      </div>
    </div>
  </div>

  <!-- Modal para Nova/Editar Nota -->
  <div id="modal-note" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="note-modal-title">Nova Nota</h3>
        <button class="modal-close" onclick="fecharModal('modal-note')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form-note">
        <input type="hidden" id="note-id">
        <div class="form-group">
          <label class="form-label">Título</label>
          <input type="text" id="note-title" class="form-input" placeholder="Ex: Lembrete Importante" required>
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <div class="rich-toolbar">
            <button type="button" class="btn-tool" onclick="formatDoc('bold')" title="Negrito">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
            </button>
            <button type="button" class="btn-tool" onclick="formatDoc('underline')" title="Sublinhado">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
            </button>
            <button type="button" class="btn-tool" onclick="formatDoc('insertUnorderedList')" title="Lista">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
          <div id="note-text" class="form-input rich-editor" contenteditable="true"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Cor do Post-it</label>
          <div class="color-picker">
            <label class="color-opt"><input type="radio" name="note-color" value="#fef9c3" checked><span style="background: #fef9c3;"></span></label>
            <label class="color-opt"><input type="radio" name="note-color" value="#dcfce7"><span style="background: #dcfce7;"></span></label>
            <label class="color-opt"><input type="radio" name="note-color" value="#dbeafe"><span style="background: #dbeafe;"></span></label>
            <label class="color-opt"><input type="radio" name="note-color" value="#fce7f3"><span style="background: #fce7f3;"></span></label>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="fecharModal('modal-note')">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save-note">Salvar Nota</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal para Gerenciar Avisos (ADM N1) -->
  <div id="modal-notice" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="notice-modal-title">Novo Aviso</h3>
        <button class="modal-close" onclick="fecharModal('modal-notice')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form-notice">
        <input type="hidden" id="notice-id">
        <div class="form-group">
          <label class="form-label">Título do Aviso</label>
          <input type="text" id="notice-title" class="form-input" placeholder="Ex: Manutenção no Sistema" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mensagem</label>
          <textarea id="notice-message" class="form-input" rows="4" placeholder="Descreva o aviso institucional..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Prioridade</label>
          <select id="notice-priority" class="form-input">
            <option value="normal">Normal</option>
            <option value="importante">Importante</option>
            <option value="urgente">Urgente</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="fecharModal('modal-notice')">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save-notice">Publicar Aviso</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script type="module" src="/meu-espaco/meu-espaco.js"></script>
</body>
</html>
