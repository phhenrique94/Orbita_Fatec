<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funcionários · Órbita - FatecIVP</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/core/layout.css">
  <link rel="stylesheet" href="/rh/funcionarios/funcionarios.css">
</head>
<body>
  <div class="particles"></div>

  <!-- Auth Guard Padrão -->
  <div id="auth-guard" class="layout-auth-guard">
    <div class="layout-spinner"></div>
    <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
  </div>

  <div id="app" class="layout-wrapper hidden">
    <!-- Sidebar injetada pelo layout.js -->
    
    <div class="layout-main">
      <!-- Header injetado pelo layout.js -->
      
      <div class="layout-content">
        
        <!-- Cabeçalho da Página -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Funcionários</h1>
                <p class="page-subtitle">Gerencie o cadastro e os turnos dos colaboradores</p>
            </div>
            <button class="btn-primary" id="btn-novo-func">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Novo Funcionário
            </button>
        </div>

        <div class="card">
            <!-- Busca -->
            <div class="func-search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-func" placeholder="Buscar funcionário por nome ou cargo...">
            </div>

            <!-- Lista -->
            <div id="lista-funcionarios" class="func-list">
                <div class="loading-state">Carregando funcionários...</div>
            </div>
        </div>

      </div> <!-- Fim layout-content -->
    </div> <!-- Fim layout-main -->
  </div> <!-- Fim layout-wrapper -->

  <!-- ===================== MODAL: FUNCIONÁRIO ===================== -->
  <div class="modal-overlay hidden" id="modal-func">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h3 id="modal-func-titulo">Novo Funcionário</h3>
        <button class="modal-close" id="btn-fechar-modal-func">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="form-func">
        <input type="hidden" id="func-edit-id">

        <div class="form-group">
          <label>Nome completo *</label>
          <input type="text" id="func-nome" placeholder="Ex: Maria Aparecida Silva" required>
        </div>

        <div class="form-group">
          <label>Cargo *</label>
          <input type="text" id="func-cargo" placeholder="Ex: Secretária, Coordenador..." required>
        </div>

        <div class="form-group">
          <label>Turnos de Trabalho *</label>
          <div class="turnos-grid">

            <!-- Manhã -->
            <div class="turno-bloco" id="bloco-manha">
              <label class="turno-toggle-label">
                <input type="checkbox" class="turno-check" id="turno-check-manha" value="manha">
                <div class="turno-toggle-box">
                  <svg class="turno-check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <span class="turno-emoji">🌅</span>
                <span class="turno-nome">Manhã</span>
              </label>
              <div class="turno-horarios hidden" id="horarios-manha">
                <div class="turno-time-row">
                  <div class="time-field"><label>Entrada</label><input type="time" id="entrada-manha"></div>
                  <div class="time-field"><label>Saída</label><input type="time" id="saida-manha"></div>
                  <div class="time-field"><label>Total</label><div class="turno-calc" id="calc-manha">—</div></div>
                </div>
              </div>
            </div>

            <!-- Tarde -->
            <div class="turno-bloco" id="bloco-tarde">
              <label class="turno-toggle-label">
                <input type="checkbox" class="turno-check" id="turno-check-tarde" value="tarde">
                <div class="turno-toggle-box">
                  <svg class="turno-check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <span class="turno-emoji">☀️</span>
                <span class="turno-nome">Tarde</span>
              </label>
              <div class="turno-horarios hidden" id="horarios-tarde">
                <div class="turno-time-row">
                  <div class="time-field"><label>Entrada</label><input type="time" id="entrada-tarde"></div>
                  <div class="time-field"><label>Saída</label><input type="time" id="saida-tarde"></div>
                  <div class="time-field"><label>Total</label><div class="turno-calc" id="calc-tarde">—</div></div>
                </div>
              </div>
            </div>

            <!-- Noite -->
            <div class="turno-bloco" id="bloco-noite">
              <label class="turno-toggle-label">
                <input type="checkbox" class="turno-check" id="turno-check-noite" value="noite">
                <div class="turno-toggle-box">
                  <svg class="turno-check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <span class="turno-emoji">🌙</span>
                <span class="turno-nome">Noite</span>
              </label>
              <div class="turno-horarios hidden" id="horarios-noite">
                <div class="turno-time-row">
                  <div class="time-field"><label>Entrada</label><input type="time" id="entrada-noite"></div>
                  <div class="time-field"><label>Saída</label><input type="time" id="saida-noite"></div>
                  <div class="time-field"><label>Total</label><div class="turno-calc" id="calc-noite">—</div></div>
                </div>
              </div>
            </div>

          </div>
          <!-- Total consolidado -->
          <div class="turno-total-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Total por dia: <strong id="turno-total-horas">0h</strong>
          </div>
        </div>

        <p id="func-form-error" class="form-error hidden"></p>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cancelar-modal-func">Cancelar</button>
          <button type="submit" class="btn-primary" id="btn-salvar-func">
            <span id="func-btn-text">Salvar</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="ch-toast hidden"></div>

  <script type="module" src="/rh/funcionarios/app.js"></script>
</body>
</html>
