<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão da Agenda · Órbita - FatecIVP</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/core/layout.css">
  <link rel="stylesheet" href="/agenda/agenda.css">
  <!-- Reutilizando CSS do publico para não recriar a roda se possivel, mas como é modulo interno, melhor ter o proprio -->
</head>

<body>

  <!-- Auth Guard -->
  <div id="auth-guard" class="layout-auth-guard">
    <div class="layout-spinner"></div>
    <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
  </div>

  <div class="layout-wrapper" style="display: none;" id="layout-wrapper">
    <main class="layout-main">
      <div class="layout-content">
        <div class="agenda-topbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2 style="margin:0; font-size: 1.5rem; color: var(--primary-blue);">Calendário de Laboratórios</h2>
          <button class="btn-primary" onclick="abrirModalLocal()">Gerenciar Locais</button>
        </div>

        <div class="agenda-layout">
          <div class="agenda-sidebar">
            <h3>Solicitações Pendentes</h3>
            <div id="pendentes-list" class="pendentes-list">
              <p class="empty-state">Nenhuma solicitação pendente.</p>
            </div>
          </div>
          
          <div class="agenda-main">

            <!-- Mapa de Ocupação -->
            <div class="ocupacao-map" id="ocupacao-map">
              <div class="ocupacao-map-header">
                <div class="ocupacao-map-title">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                  Mapa de Ocupação — Agora
                </div>
                <div class="ocupacao-map-legend">
                  <span class="legend-item"><span class="dot dot-livre"></span>Livre</span>
                  <span class="legend-item"><span class="dot dot-ocupado"></span>Ocupado</span>
                  <span class="legend-item"><span class="dot dot-parcial"></span>Pendente</span>
                  <div class="ocupacao-clock" id="ocupacao-clock">--:--</div>
                </div>
              </div>
              <div class="ocupacao-grid" id="ocupacao-grid">
                <div class="ocupacao-loading">Carregando locais...</div>
              </div>
            </div>

            <div class="filters-row">
              <div class="filter-group">
                <label>Filtrar Local:</label>
                <select id="select-local">
                  <option value="">Carregando...</option>
                </select>
              </div>
            </div>

            <div class="calendar-container">
              <div class="calendar-header">
                <button id="btn-prev-month" class="btn-icon">&lt;</button>
                <h3 id="current-month-year">Mês Ano</h3>
                <button id="btn-next-month" class="btn-icon">&gt;</button>
              </div>
              <div class="calendar-grid" id="calendar-grid">
                <div class="weekday">Dom</div>
                <div class="weekday">Seg</div>
                <div class="weekday">Ter</div>
                <div class="weekday">Qua</div>
                <div class="weekday">Qui</div>
                <div class="weekday">Sex</div>
                <div class="weekday">Sáb</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal Aprovação/Rejeição -->
  <div id="modal-acao" class="modal-overlay">
    <div class="modal-box">
      <h3>Gerenciar Solicitação</h3>
      <div id="detalhes-solicitacao" style="margin: 1rem 0; line-height: 1.5;"></div>
      <div class="form-actions" style="flex-wrap: wrap;">
        <button class="btn-secondary" onclick="fecharModalAcao()">Voltar</button>
        <button class="btn-danger" id="btn-rejeitar">Rejeitar</button>
        <button class="btn-primary" id="btn-aprovar">Aprovar</button>
        <button class="btn-secondary" id="btn-editar" style="display:none; border-color: #0ea5e9; color: #0ea5e9;">Editar</button>
        <button class="btn-danger" id="btn-excluir" style="display:none;">Excluir</button>
      </div>
    </div>
  </div>

  <!-- Modal Evento (Criar/Editar) -->
  <div id="modal-evento" class="modal-overlay">
    <div class="modal-box">
      <h3 id="modal-evento-titulo">Novo Evento</h3>
      <form id="form-evento" class="cadastro-form">
        <input type="hidden" id="ev-id">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="ev-data" required>
        </div>
        <div class="form-group">
          <label>Local</label>
          <select id="ev-local" required>
            <option value="">Selecione...</option>
          </select>
        </div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>Início</label>
            <input type="time" id="ev-inicio" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Fim</label>
            <input type="time" id="ev-fim" required>
          </div>
        </div>
        <div class="form-group">
          <label>Título do Evento</label>
          <input type="text" id="ev-titulo" required>
        </div>
        <div class="form-group">
          <label>Solicitante</label>
          <input type="text" id="ev-solicitante" required>
        </div>
        <div class="form-group">
          <label>Curso/Setor (Opcional)</label>
          <input type="text" id="ev-curso">
        </div>
        <div class="form-group">
          <label>Descrição (Opcional)</label>
          <textarea id="ev-descricao" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="fecharModalEvento()">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar Evento</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Novo Local -->
  <div id="modal-local" class="modal-overlay">
    <div class="modal-box">
      <h3>Adicionar Novo Local</h3>
      <form id="form-local" class="cadastro-form">
        <div class="form-group">
          <label>Nome do Local</label>
          <input type="text" id="loc-nome" required>
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="loc-tipo">
            <option value="laboratorio">Laboratório</option>
            <option value="auditorio">Auditório</option>
            <option value="jbl">JBL</option>
            <option value="sala">Sala de Aula</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="fecharModalLocal()">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar Local</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/core/auth.js"></script>
  <script type="module" src="/agenda/app.js"></script>
</body>

</html>
