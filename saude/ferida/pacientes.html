<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes · Ferida - Órbita FATEC</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/core/layout.css">
    <link rel="stylesheet" href="/saude/ferida/ferida.css">
</head>
<body>
    <!-- Auth Guard Padrão -->
    <div id="auth-guard" class="layout-auth-guard">
        <div class="layout-spinner"></div>
        <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
    </div>

    <div id="app" class="layout-wrapper hidden">
        <!-- Sidebar injetada pelo layout.js -->

        <main class="layout-main">
            <!-- Header injetado pelo layout.js -->

            <div class="layout-content ferida-content">
                <!-- Cabeçalho da Página -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Pacientes</h1>
                        <p class="page-subtitle">Ambulatório · todos os cadastros — busque por nome, município ou nascimento</p>
                    </div>
                    <div class="page-header-actions">
                        <a class="btn-import" href="index.html" style="text-decoration:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                            Voltar para a ficha
                        </a>
                    </div>
                </div>

                <div class="panel pac-lista-panel">
                    <div class="pac-busca">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="busca-paciente" placeholder="Buscar por nome, município ou data de nascimento (ex.: 12/05/1990)..." autocomplete="off">
                    </div>

                    <div class="pac-lista-tabela-wrap">
                        <table class="pac-lista-tabela">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Nascimento</th>
                                    <th>Município</th>
                                    <th>Cadastrado em</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-pacientes">
                                <tr><td colspan="4" class="pac-lista-msg">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/saude/ferida/app.js"></script>
</body>
</html>
