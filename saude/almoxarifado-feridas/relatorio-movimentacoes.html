<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Movimentações · Almoxarifado Feridas - Órbita FATEC</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/core/layout.css">
    <link rel="stylesheet" href="/saude/almoxarifado-feridas/almoxarifado.css">
</head>
<body class="pagina-relatorio">
    <!-- Auth Guard Padrão -->
    <div id="auth-guard" class="layout-auth-guard">
        <div class="layout-spinner"></div>
        <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
    </div>

    <div id="app" class="layout-wrapper hidden">
        <!-- Sidebar injetada pelo layout.js -->

        <main class="layout-main">
            <!-- Header injetado pelo layout.js -->

            <div class="layout-content alx-content no-print">
                <!-- Cabeçalho da Página -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Relatório de Movimentações</h1>
                        <p class="page-subtitle">Extrato de entradas e saídas do almoxarifado num período</p>
                    </div>
                    <div class="page-header-actions">
                        <a class="btn-import" href="index.html" style="text-decoration:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                            Voltar
                        </a>
                        <button class="btn-primary" id="btn-imprimir-relatorio-mov" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            Imprimir / Salvar PDF
                        </button>
                    </div>
                </div>

                <div class="panel">
                    <span class="eyebrow">Período</span>
                    <h2 class="title">Escolha o período do relatório</h2>
                    <p class="hint">Nada é buscado até você clicar em "Gerar" — evita consultas desnecessárias ao banco.</p>
                    <div class="rel-filtro">
                        <div class="form-group">
                            <label>Início</label>
                            <input type="date" id="mov-filtro-inicio">
                        </div>
                        <div class="form-group">
                            <label>Fim</label>
                            <input type="date" id="mov-filtro-fim">
                        </div>
                        <button type="button" class="btn-primary" id="btn-gerar-relatorio-mov">Gerar</button>
                    </div>
                </div>

                <div id="relatorio-movimentacoes-msg" class="panel hidden"></div>
            </div>

            <!-- Conteúdo do relatório: só isto fica visível na impressão -->
            <div class="print-page" id="relatorio-movimentacoes-conteudo"></div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/saude/almoxarifado-feridas/app.js"></script>
</body>
</html>
