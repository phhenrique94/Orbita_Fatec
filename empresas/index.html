<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiros - Órbita FATEC</title>
    <link rel="stylesheet" href="/core/layout.css">
    <link rel="stylesheet" href="/empresas/empresas.css">
</head>
<body>
    <div class="layout-wrapper" id="app-root">
        <!-- Sidebar and Header injected by layout.js -->
        
        <main class="layout-main">
            <div class="layout-content">
                
                <!-- Cabeçalho da Página -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Parceiros</h1>
                        <p class="page-subtitle">Gerencie o Clube de Vantagens e os Lojistas</p>
                    </div>
                    <button class="btn-primary" onclick="openModal()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                        Novo Parceiro
                    </button>
                </div>
                <!-- Filtros -->
                <div class="filters-bar">
                    <div class="search-wrap">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="filter-texto" class="search-input" placeholder="Buscar por nome, descrição ou local...">
                    </div>
                    <select id="filter-categoria" class="select-filter">
                        <option value="">Todas as Categorias</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Vestuário">Roupas / Vestuário</option>
                        <option value="Calçados">Sapatos / Calçados</option>
                        <option value="Saúde">Saúde e Bem-estar</option>
                        <option value="Educação">Educação e Cursos</option>
                        <option value="Automóvel">Automóvel / Oficina</option>
                        <option value="Lazer">Lazer / Entretenimento</option>
                        <option value="Tecnologia">Tecnologia / Eletrônicos</option>
                        <option value="Serviços">Serviços Gerais</option>
                        <option value="Outros">Outros</option>
                    </select>
                    <button class="btn-clear-filters hidden" id="btn-clear-filters" onclick="clearFilters()"
                        title="Limpar filtros">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        Limpar
                    </button>
                </div>

                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Descrição</th>
                                <th>Localização</th>
                                <th>Desconto</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="empresas-list">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-empresa" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-title">Novo Parceiro</h2>
            <form id="form-empresa">
                <input type="hidden" id="empresa-id">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="empresa-nome" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="empresa-categoria" required>
                        <option value="">Selecione uma categoria</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Vestuário">Roupas / Vestuário</option>
                        <option value="Calçados">Sapatos / Calçados</option>
                        <option value="Saúde">Saúde e Bem-estar</option>
                        <option value="Educação">Educação e Cursos</option>
                        <option value="Automóvel">Automóvel / Oficina</option>
                        <option value="Lazer">Lazer / Entretenimento</option>
                        <option value="Tecnologia">Tecnologia / Eletrônicos</option>
                        <option value="Serviços">Serviços Gerais</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descrição/Benefício</label>
                    <input type="text" id="empresa-descricao" placeholder="Ex: A maior loja de calçados da cidade" required>
                </div>
                <div class="form-group">
                    <label>Localização</label>
                    <input type="text" id="empresa-localizacao" required>
                </div>
                <div class="form-group">
                    <label>Desconto e Condições</label>
                    <input type="text" id="empresa-desconto" placeholder="Ex: 15% de desconto em sapatos femininos" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/empresas/app.js"></script>
</body>
</html>
